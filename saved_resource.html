<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #3C3C3C; }
  svg { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="60%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#b8d4e3"/>
    </linearGradient>
    <linearGradient id="mountain1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a6e7a"/>
      <stop offset="100%" stop-color="#3a4a55"/>
    </linearGradient>
    <linearGradient id="mountain2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b7f8b"/>
      <stop offset="100%" stop-color="#4b5f6b"/>
    </linearGradient>
    <linearGradient id="hills" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a7a4a"/>
      <stop offset="100%" stop-color="#3d5a2e"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a6b3a"/>
      <stop offset="100%" stop-color="#2d4a1e"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a7a5a"/>
      <stop offset="100%" stop-color="#6a5a3a"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a3a2a"/>
      <stop offset="100%" stop-color="#4a2a1a"/>
    </linearGradient>
    <linearGradient id="castle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a8a6a"/>
      <stop offset="100%" stop-color="#6a5a3a"/>
    </linearGradient>
    <linearGradient id="castleRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3a2a"/>
      <stop offset="100%" stop-color="#3a2a1a"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7a9a"/>
      <stop offset="100%" stop-color="#3a5a7a"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Clouds -->
  <g opacity="0.6" fill="#ffffff">
    <ellipse cx="300" cy="120" rx="160" ry="40"/>
    <ellipse cx="360" cy="100" rx="120" ry="35"/>
    <ellipse cx="250" cy="105" rx="100" ry="30"/>
    <ellipse cx="1400" cy="150" rx="180" ry="45"/>
    <ellipse cx="1480" cy="130" rx="140" ry="35"/>
    <ellipse cx="1350" cy="135" rx="120" ry="30"/>
    <ellipse cx="800" cy="90" rx="100" ry="25"/>
    <ellipse cx="1700" cy="100" rx="130" ry="30"/>
  </g>

  <!-- Far Mountains -->
  <path d="M0 550 L150 350 L280 450 L400 320 L550 420 L700 300 L850 400 L1000 340 L1150 430 L1300 360 L1450 450 L1600 330 L1750 420 L1920 380 L1920 650 L0 650Z" fill="url(#mountain1)" opacity="0.7"/>

  <!-- Snow caps -->
  <path d="M400 320 L430 350 L370 350Z" fill="#e8e8e8" opacity="0.8"/>
  <path d="M700 300 L730 330 L670 330Z" fill="#e8e8e8" opacity="0.8"/>
  <path d="M1600 330 L1630 360 L1570 360Z" fill="#e8e8e8" opacity="0.8"/>
  <path d="M200 370 L230 400 L170 400Z" fill="#e8e8e8" opacity="0.6"/>
  <path d="M1000 340 L1030 370 L970 370Z" fill="#e8e8e8" opacity="0.6"/>

  <!-- Near Mountains -->
  <path d="M0 600 L120 450 L240 530 L350 460 L480 540 L600 480 L720 550 L840 470 L960 540 L1080 490 L1200 560 L1320 480 L1440 550 L1560 500 L1680 560 L1800 490 L1920 530 L1920 700 L0 700Z" fill="url(#mountain2)" opacity="0.8"/>

  <!-- Rolling hills behind village -->
  <path d="M0 620 Q200 560 400 600 Q600 550 800 590 Q1000 540 1200 580 Q1400 550 1600 580 Q1800 560 1920 590 L1920 750 L0 750Z" fill="url(#hills)"/>

  <!-- Ground / meadow -->
  <path d="M0 680 Q300 650 600 670 Q900 640 1200 660 Q1500 640 1920 660 L1920 1080 L0 1080Z" fill="url(#ground)"/>

  <!-- River/water -->
  <path d="M1920 780 Q1700 760 1600 800 Q1500 850 1450 880 Q1400 920 1350 950 Q1300 980 1280 1080 L1920 1080Z" fill="url(#water)" opacity="0.7"/>

  <!-- === MEDIEVAL VILLAGE === -->
  <!-- Village wall / fortifications -->
  <path d="M200 620 L220 620 L220 580 L240 580 L240 620 L260 620 L260 570 L280 570 L280 620 L300 620 L300 560 L320 560 L320 620 L340 620 L340 570 L360 570 L360 620 L380 620 L380 580 L400 580 L400 620 L420 620 L420 570 L440 570 L440 620 L460 620 L460 580 L480 580 L480 620 L500 620 L500 570 L520 570 L520 620 L540 620 L540 580 L560 580 L560 620 L580 620 L580 570 L600 570 L600 620 L620 620 L620 580 L640 580 L640 620 L660 620 L660 570 L680 570 L680 620 L700 620 L700 580 L720 580 L720 620 L740 620 L740 570 L760 570 L760 620 L780 620 L780 580 L800 580 L800 620 L820 620 L820 570 L840 570 L840 620 L860 620 L860 580 L880 580 L880 620 L900 620 L900 570 L920 570 L920 620 L940 620 L940 580 L960 580 L960 620 L980 620 L980 570 L1000 570 L1000 620" stroke="#6a5a3a" stroke-width="3" fill="none"/>

  <!-- Village ground/base -->
  <rect x="200" y="620" width="800" height="60" fill="#5a4a2a" rx="2"/>

  <!-- === HOUSES === -->

  <!-- House 1 - left -->
  <rect x="230" y="560" width="50" height="60" fill="#8a7a5a"/>
  <polygon points="225,560 255,520 285,560" fill="url(#roof)"/>
  <rect x="245" y="590" width="12" height="30" fill="#3a2a1a"/>
  <rect x="230" y="570" width="10" height="10" fill="#c4a85a"/>

  <!-- House 2 -->
  <rect x="300" y="550" width="55" height="70" fill="#9a8a6a"/>
  <polygon points="295,550 327,510 360,550" fill="url(#roof)"/>
  <rect x="315" y="585" width="12" height="35" fill="#3a2a1a"/>
  <rect x="330" y="570" width="10" height="10" fill="#c4a85a"/>

  <!-- House 3 -->
  <rect x="370" y="565" width="45" height="55" fill="#7a6a4a"/>
  <polygon points="365,565 392,530 420,565" fill="url(#roof)"/>
  <rect x="385" y="590" width="10" height="30" fill="#3a2a1a"/>
  <rect x="370" y="575" width="8" height="8" fill="#c4a85a"/>

  <!-- House 4 - taller building -->
  <rect x="440" y="540" width="50" height="80" fill="#8a7a5a"/>
  <polygon points="435,540 465,500 495,540" fill="url(#roof)"/>
  <rect x="455" y="580" width="12" height="40" fill="#3a2a1a"/>
  <rect x="465" y="560" width="10" height="10" fill="#c4a85a"/>

  <!-- House 5 -->
  <rect x="510" y="555" width="50" height="65" fill="#9a8a6a"/>
  <polygon points="505,555 535,515 565,555" fill="url(#roof)"/>
  <rect x="528" y="585" width="12" height="35" fill="#3a2a1a"/>

  <!-- House 6 -->
  <rect x="580" y="560" width="45" height="60" fill="#7a6a4a"/>
  <polygon points="575,560 602,525 630,560" fill="url(#roof)"/>
  <rect x="595" y="590" width="10" height="30" fill="#3a2a1a"/>

  <!-- House 7 - large building (inn/tavern) -->
  <rect x="650" y="545" width="65" height="75" fill="#9a8a6a"/>
  <polygon points="645,545 682,500 720,545" fill="url(#roof)"/>
  <rect x="665" y="580" width="12" height="40" fill="#3a2a1a"/>
  <rect x="685" y="580" width="12" height="40" fill="#3a2a1a"/>
  <rect x="655" y="560" width="10" height="10" fill="#c4a85a"/>

  <!-- House 8 -->
  <rect x="735" y="560" width="50" height="60" fill="#8a7a5a"/>
  <polygon points="730,560 760,520 790,560" fill="url(#roof)"/>
  <rect x="752" y="590" width="12" height="30" fill="#3a2a1a"/>

  <!-- House 9 -->
  <rect x="800" y="555" width="50" height="65" fill="#9a8a6a"/>
  <polygon points="795,555 825,515 855,555" fill="url(#roof)"/>
  <rect x="818" y="585" width="12" height="35" fill="#3a2a1a"/>

  <!-- Church -->
  <rect x="870" y="530" width="40" height="90" fill="#aaa88a"/>
  <polygon points="865,530 890,490 915,530" fill="#5a3a2a"/>
  <rect x="885" y="580" width="10" height="40" fill="#3a2a1a"/>
  <rect x="870" y="550" width="8" height="12" fill="#c4a85a"/>
  <!-- Church steeple -->
  <rect x="886" y="470" width="8" height="25" fill="#5a3a2a"/>
  <polygon points="884,470 890,450 896,470" fill="#5a3a2a"/>
  <!-- Cross -->
  <line x1="890" y1="445" x2="890" y2="435" stroke="#c4a85a" stroke-width="2"/>
  <line x1="886" y1="440" x2="894" y2="440" stroke="#c4a85a" stroke-width="2"/>

  <!-- === CASTLE (on the hill behind village) === -->
  <!-- Castle base -->
  <rect x="920" y="470" width="120" height="150" fill="url(#castle)"/>
  <!-- Castle towers -->
  <rect x="910" y="440" width="30" height="60" fill="url(#castle)"/>
  <polygon points="905,440 925,415 945,440" fill="url(#castleRoof)"/>
  <rect x="1020" y="450" width="30" height="50" fill="url(#castle)"/>
  <polygon points="1015,450 1035,425 1055,450" fill="url(#castleRoof)"/>
  <!-- Castle main tower -->
  <rect x="965" y="420" width="35" height="80" fill="url(#castle)"/>
  <polygon points="960,420 982,390 1005,420" fill="url(#castleRoof)"/>
  <!-- Castle windows -->
  <rect x="935" y="500" width="8" height="12" fill="#3a2a1a"/>
  <rect x="985" y="500" width="8" height="12" fill="#3a2a1a"/>
  <rect x="1030" y="500" width="8" height="12" fill="#3a2a1a"/>
  <rect x="970" y="450" width="10" height="14" fill="#3a2a1a"/>
  <!-- Castle gate -->
  <path d="M965 620 Q970 600 975 600 L985 600 Q990 600 995 620Z" fill="#3a2a1a"/>
  <!-- Castle flag -->
  <line x1="982" y1="390" x2="982" y2="365" stroke="#5a3a2a" stroke-width="2"/>
  <polygon points="982,365 1000,372 982,380" fill="#a02020"/>

  <!-- Village fence/posts -->
  <line x1="200" y1="620" x2="200" y2="680" stroke="#5a4a2a" stroke-width="3"/>
  <line x1="1000" y1="620" x2="1000" y2="680" stroke="#5a4a2a" stroke-width="3"/>

  <!-- Path/road through village -->
  <path d="M465 680 Q465 650 465 620" stroke="#8a7a5a" stroke-width="12" fill="none" opacity="0.5"/>

  <!-- === TREES === -->
  <g>
    <!-- Tree 1 -->
    <rect x="155" y="600" width="8" height="40" fill="#4a2a1a"/>
    <ellipse cx="159" cy="590" rx="25" ry="30" fill="#2a5a1a"/>
    <ellipse cx="159" cy="580" rx="20" ry="25" fill="#3a6a2a"/>

    <!-- Tree 2 -->
    <rect x="1060" y="590" width="8" height="45" fill="#4a2a1a"/>
    <ellipse cx="1064" cy="580" rx="28" ry="32" fill="#2a5a1a"/>
    <ellipse cx="1064" cy="570" rx="22" ry="26" fill="#3a6a2a"/>

    <!-- Tree 3 -->
    <rect x="1100" y="600" width="7" height="35" fill="#4a2a1a"/>
    <ellipse cx="1103" cy="590" rx="22" ry="28" fill="#2a5a1a"/>

    <!-- Tree 4 -->
    <rect x="165" y="610" width="6" height="30" fill="#4a2a1a"/>
    <ellipse cx="168" cy="600" rx="18" ry="22" fill="#2a5a1a"/>

    <!-- Tree 5 -->
    <rect x="1120" y="605" width="7" height="30" fill="#4a2a1a"/>
    <ellipse cx="1123" cy="595" rx="20" ry="25" fill="#2a5a1a"/>
  </g>

  <!-- Smoke from chimneys -->
  <g opacity="0.3" fill="#aaaaaa">
    <circle cx="260" cy="505" r="4">
      <animate attributeName="cy" values="505;490;475" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;7;10" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.15;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="265" cy="500" r="3">
      <animate attributeName="cy" values="500;485;470" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;6;9" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.15;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="495" r="4">
      <animate attributeName="cy" values="495;480;465" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;7;10" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.15;0" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
</body>
</html>
