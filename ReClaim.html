    var last = (getEntryText(entries[entries.length-1]) || '').toLowerCase();
    if (last.match(/crav|urge|relaps|trigger|tempted|slip/)) return 'You mentioned a trigger recently. What strategies helped you get through it? How are you feeling about it now?';
    if (last.match(/proud|accomplish|achieved|milestone|win|success|progress|goal|completed|finished/)) return 'That progress you mentioned â€” how did it feel? What helped you get there? Take a moment to really sit with that win.';
    if (last.match(/sad|depres|lonel|alone|cry|grief|sorrow|despair|mourn/)) return 'You were feeling heavy last time. What do you need right now that you haven\'t given yourself? It\'s okay to not be okay.';
    if (last.match(/angr|frustrat|mad|rage|pissed|furiou|annoyed|irritat/)) return 'Last time you wrote about frustration. Has that shifted? What would help you release what\'s still lingering?';
    if (last.match(/anxi|worr|panic|scared|fear|stress|nervous|overwhelm|tense/)) return 'You were carrying anxiety last time. Let\'s check in â€” what\'s the volume of that worry today? What do you need to feel safer?';
    if (last.match(/grateful|thank|blessed|appreciate|gratitude|blessing/)) return 'You found something to appreciate last time. What else has been good since then? Let\'s keep collecting those moments.';
    if (last.match(/friend|family|mom|dad|partner|husband|wife|boyfriend|girlfriend|sister|brother/)) return 'How are things with the people you mentioned last time? Any updates worth noting? Connection matters in recovery.';
    if (last.match(/job|work|career|boss|coworker|interview|fired|promot|office|meeting|deadline|project/)) return 'Last time you wrote about work. How is that situation evolving? What\'s one thing you can do today to improve it?';
    if (last.match(/sleep|tired|exhaust|insomnia|rest/)) return 'You mentioned being exhausted last time. Have you been able to rest since then? Sleep is a foundation of recovery â€” how is yours?';
    if (last.match(/exercise|workout|gym|run|walk|yoga|meditat/)) return 'You were focusing on wellness last time. How has your routine been? What feels good for your body today?';
    if (last.match(/school|class|college|university|exam|test|study|course|grade/)) return 'You wrote about your studies last time. How are things going? What\'s one small step you can take today?';
    if (last.match(/money|bills|debt|loan|rent|budget|finance|afford/)) return 'Finances were on your mind last time. Has anything shifted? What\'s within your control right now?';
    if (last.match(/alone|lonely|isolat|miss|nobody|no one|empty|numb/)) return 'You were feeling isolated last time. I want you to know you\'re not alone in this. What would make you feel even 1% more connected today?';
    if (last.match(/doctor|therapist|appointment|medication|therapy|counsel/)) return 'You mentioned your health journey last time. How did that appointment go? How are you feeling about your treatment?';
    if (last.match(/sober.*day|day.*sober|clean|recover|heal|stronger|growth|progress/)) return 'You\'re building real momentum. What\'s working for you right now that you want to keep doing? Let\'s lock in those habits.';
  }
  var now = new Date();
  var start = new Date(now.getFullYear(), 0, 0);
  var dayOfYear = Math.floor((now - start) / 86400000);
  return DAILY_PROMPTS[dayOfYear % DAILY_PROMPTS.length];
}

var PAIRING_STORAGE_KEY = 'rc_buddies';

function getRegisteredBuddies() {
  try { return JSON.parse(localStorage.getItem(PAIRING_STORAGE_KEY)) || []; } catch(e) { return []; }
}
function saveRegisteredBuddies(list) {
  localStorage.setItem(PAIRING_STORAGE_KEY, JSON.stringify(list));
}

function fetchGlobalBuddies(callback) {
  if (!firebase || !firebase.auth().currentUser) { callback(null); return; }
  DB.collection('users').get()
    .then(function(snapshot){
      var list = [];
      snapshot.forEach(function(doc){ list.push(doc.data()); });
      callback(list);
    })
    .catch(function(){callback(null)});
}

function syncToGlobal(entry) {
  if (!firebase || !firebase.auth().currentUser) return;
  DB.collection('users').doc(AUTH_EMAIL).set(entry).catch(function(){});
}

function registerCurrentUser() {
  var list = getRegisteredBuddies();
  var idx = list.findIndex(function(b){return b.email === AUTH_EMAIL});
  var entry = { name: D.name || AUTH_USER, email: AUTH_EMAIL, phoneNumber: D.phoneNumber || '', language: D.language || 'English', joinDate: Date.now() };
  if (idx >= 0) list[idx] = entry;
  else list.push(entry);
  saveRegisteredBuddies(list);
  // Force token refresh before Firestore write to ensure auth is propagated
  var cur = firebase.auth().currentUser;
  if (cur) {
    cur.getIdToken(true).then(function(){ syncToGlobal(entry); }).catch(function(){ syncToGlobal(entry); });
  } else {
    syncToGlobal(entry);
  }
}
function generatePairingCode() {
  registerCurrentUser();
  var code = '';
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  for (var i=0;i<6;i++) code += chars[Math.floor(Math.random() * chars.length)];
  var shareBtn = (navigator.share ? '<button class="btn btn-sm btn-primary" onclick="navigator.share({title:\'Re.Claim Buddy Code\',text:\'Connect with me on Re.Claim! My pairing code: ' + code + ' (Language: ' + (D.language || 'English') + ')\'}).catch(function(){})" style="margin-top:4px;width:auto;margin-right:4px">Share</button>' : '');
  document.getElementById('pairing-result').innerHTML = '<div style="background:var(--primary-light);padding:12px;border-radius:10px;text-align:center"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Share this code with your buddy anywhere in the world:</div><div style="font-size:32px;font-weight:900;color:var(--primary);letter-spacing:6px">' + code + '</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Your language: <strong>' + (D.language || 'English') + '</strong></div><div style="margin-top:6px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap">' + shareBtn + '<button class="btn btn-sm btn-outline" onclick="navigator.clipboard.writeText(\'' + code + '\');this.textContent=\'Copied!\'" style="width:auto">Copy Code</button></div></div>';
  // Save code globally
  DB.collection('pairingCodes').doc(AUTH_EMAIL).set({ code: code }).catch(function(){});
}
function connectPairingCode() {
  var input = document.getElementById('pairing-code');
  if (!input || !input.value.trim()) { alert(t('Enter a pairing code.')); return; }
  var code = input.value.trim().toUpperCase();
  var list = getRegisteredBuddies();
  var allCodes = JSON.parse(localStorage.getItem('rc_pairing_codes') || '{}');
  var matchEmail = null;
  // Check local storage first
  for (var e in allCodes) {
    if (allCodes[e] === code && e !== AUTH_EMAIL) { matchEmail = e; break; }
  }
  if (matchEmail) {
    var match = list.find(function(b){return b.email === matchEmail});
    if (match) { finishPairing(match, matchEmail); return; }
    // Try Firestore for full user info
    DB.collection('users').doc(matchEmail).get().then(function(doc){
      if (doc.exists) finishPairing(doc.data(), matchEmail);
    });
    return;
  }
  // Query Firestore for matching pairing code
  DB.collection('pairingCodes').where('code', '==', code).get()
    .then(function(snapshot){
      var foundBuddy = null;
      snapshot.forEach(function(doc){
        if (doc.id !== AUTH_EMAIL) foundBuddy = { email: doc.id };
      });
      if (foundBuddy) {
        DB.collection('users').doc(foundBuddy.email).get().then(function(userDoc){
          if (userDoc.exists) finishPairing(userDoc.data(), foundBuddy.email);
        });
        return;
      }
      // Code not found â€” save this one for a buddy to match
      allCodes[AUTH_EMAIL] = code;
      localStorage.setItem('rc_pairing_codes', JSON.stringify(allCodes));
      DB.collection('pairingCodes').doc(AUTH_EMAIL).set({ code: code }).catch(function(){});
      registerCurrentUser();
      document.getElementById('pairing-result').innerHTML = '<div style="font-size:13px;color:var(--muted)">Code saved and shared globally! Share it with your buddy anywhere in the world.</div>';
    })
    .catch(function(){
      // Offline fallback
      allCodes[AUTH_EMAIL] = code;
      localStorage.setItem('rc_pairing_codes', JSON.stringify(allCodes));
      registerCurrentUser();
      document.getElementById('pairing-result').innerHTML = '<div style="font-size:13px;color:var(--muted)">Code saved locally! Share it with your buddy.</div>';
    });
}

function finishPairing(match, email) {
  D.buddy = { name: match.name, contact: email, relationship: 'Accountability Partner (paired)', language: match.language || (D.language || 'English') };
  var pairedList = D.pairedBuddies || [];
  if (!pairedList.some(function(p){return p.email === email})) {
    pairedList.push({ name: match.name, email: email, language: match.language || (D.language || 'English'), pairedDate: Date.now() });
    D.pairedBuddies = pairedList;
  }
  saveData();
  var result = document.getElementById('pairing-result');
  if (result) result.innerHTML = '<div style="font-size:13px;color:var(--primary);font-weight:600">Connected with ' + match.name + ' from ' + (match.language || 'your language') + '! You can now support each other.</div>';
  var input = document.getElementById('pairing-code');
  if (input) input.value = '';
}
function connectToBuddy(email) {
  var list = getRegisteredBuddies();
  var match = list.find(function(b){return b.email === email});
  if (match) { finishPairing(match, email); return; }
  // Try Firestore
  DB.collection('users').doc(email).get().then(function(doc){
    if (doc.exists) { finishPairing(doc.data(), email); return; }
    alert(t('Buddy not found. Make sure they have registered by visiting the Buddy page.'));
  }).catch(function(){alert(t('Could not reach global directory. Try again later.'))});
}

function findBuddyAuto() {
  if (!firebase || !firebase.auth().currentUser) { alert(t('Sign in to find a buddy.')); return; }
  var btn = event && event.target ? event.target : document.getElementById('find-buddy-btn');
  if (btn) { btn.textContent = 'Searching...'; btn.disabled = true; }
  var lang = D.language || 'English';
  DB.collection('users').get().then(function(snapshot){
    var available = [];
    snapshot.forEach(function(doc){
      if (doc.id !== AUTH_EMAIL && doc.data().language === lang) available.push(doc.data());
    });
    if (btn) { btn.textContent = 'Find Me a Buddy'; btn.disabled = false; }
    if (!available.length) {
      var el = document.getElementById('auto-buddy-result');
      if (el) el.innerHTML = '<div style="text-align:center;padding:12px;background:var(--primary-light);border-radius:10px"><div style="font-size:12px;color:var(--muted)">No available buddies in <strong>' + lang + '</strong> right now. Try generating a pairing code to invite someone!</div></div>';
      return;
    }
    var pick = available[Math.floor(Math.random() * available.length)];
    finishPairing(pick, pick.email);
    var el = document.getElementById('auto-buddy-result');
    if (el) el.innerHTML = '<div style="text-align:center;padding:12px;background:var(--primary-light);border-radius:10px;border:2px solid var(--primary)"><div style="font-size:24px;margin-bottom:4px">ðŸŽ‰</div><div style="font-weight:700;font-size:15px;color:var(--primary)">Connected with ' + pick.name + '!</div><div style="font-size:12px;color:var(--muted)">You can support each other on your recovery journey.</div><button class="btn btn-sm btn-primary" onclick="goTo(\'buddy\')" style="margin-top:6px">Go to Buddy Page</button></div>';
  }).catch(function(){
    if (btn) { btn.textContent = 'Find Me a Buddy'; btn.disabled = false; }
    var el = document.getElementById('auto-buddy-result');
    if (el) el.innerHTML = '<div style="text-align:center;padding:12px;background:var(--danger-bg);border-radius:10px;font-size:12px;color:var(--danger)">Could not reach the buddy directory. Check your connection.</div>';
  });
}

function buddyStreak() {
  var s = 0;
  var d = new Date();
  for (var i=0;i<365;i++) {
    var ds = d.toDateString();
    var found = D.buddyCheckins.some(function(c){return c.date===ds});
    if (found) s++;
    else if (i>0) break;
    d.setDate(d.getDate()-1);
  }
  return s;
}

// ====== STREAK CALENDAR ======
var CAL_MONTH_OFFSET = 0;

function calendarHTML() {
  var now = new Date();
  var d = new Date(now.getFullYear(), now.getMonth() + CAL_MONTH_OFFSET, 1);
  var year = d.getFullYear(), month = d.getMonth();
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var h = '<h2 style="font-size:20px;font-weight:700;margin:8px 0">'+t('Streak Calendar')+'</h2>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:8px">'+t('Color-coded view of your daily activity.')+'</p>';
  h += '<div class="card">';
  h += '<div class="cal-nav"><button onclick="CAL_MONTH_OFFSET--;render()">'+t('Prev')+'</button><span style="font-weight:700;font-size:15px">'+months[month]+' '+year+'</span><button onclick="CAL_MONTH_OFFSET++;render()">'+t('Next')+'</button></div>';
  h += '<div class="cal-grid">';
  var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for (var i=0;i<7;i++) h += '<div class="cal-header">'+dayNames[i]+'</div>';
  var firstDay = d.getDay();
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var prevDays = new Date(year, month, 0).getDate();
  for (var i=0;i<firstDay;i++) { h += '<div class="cal-day other-month" style="background:transparent;cursor:default">'+(prevDays-firstDay+1+i)+'</div>'; }
  for (var day=1;day<=daysInMonth;day++) {
    var dateObj = new Date(year, month, day);
    var dateStr = dateObj.toDateString();
    var isToday = dateStr === now.toDateString();
    var isFuture = dateObj > now;
    var hasMood = D.moods.some(function(m){return m.date===dateStr});
    var hasCheck = D.checkins.some(function(c){return c.date===dateStr});
    var habitsDone = D.habits.filter(function(h){return h.logs && h.logs.indexOf(dateStr)!==-1}).length;
    var hasJournal = D.journal.some(function(j){return j.date===dateStr});
    if (!isFuture) {
      if (hasMood && habitsDone > 0) { h += '<div class="cal-day'+(isToday?' today':'')+'" style="background:var(--primary);color:#fff" onclick="showDayDetail(\''+dateStr+'\')"><span>'+day+'</span></div>'; }
      else if (hasMood && hasJournal) { h += '<div class="cal-day'+(isToday?' today':'')+'" style="background:#3b82f6;color:#fff" onclick="showDayDetail(\''+dateStr+'\')"><span>'+day+'</span></div>'; }
      else if (hasMood) { h += '<div class="cal-day'+(isToday?' today':'')+'" style="background:#22c55e;color:#fff" onclick="showDayDetail(\''+dateStr+'\')"><span>'+day+'</span></div>'; }
      else if (hasCheck || habitsDone > 0) { h += '<div class="cal-day'+(isToday?' today':'')+'" style="background:var(--accent);color:#fff" onclick="showDayDetail(\''+dateStr+'\')"><span>'+day+'</span></div>'; }
      else { h += '<div class="cal-day'+(isToday?' today':'')+'" style="background:var(--border);color:var(--muted)" onclick="showDayDetail(\''+dateStr+'\')"><span>'+day+'</span></div>'; }
    } else {
      h += '<div class="cal-day future" style="background:transparent;color:var(--muted)"><span>'+day+'</span></div>';
    }
  }
  var rem = 7 - ((firstDay + daysInMonth) % 7);
  if (rem < 7) { for (var i=1;i<=rem;i++) { h += '<div class="cal-day other-month" style="background:transparent;cursor:default">'+i+'</div>'; } }
  h += '</div>';
  h += '<div class="cal-legend"><span><span class="swatch" style="background:var(--primary)"></span>'+t('Mood+Habits')+'</span><span><span class="swatch" style="background:#3b82f6"></span>'+t('Mood+Journal')+'</span><span><span class="swatch" style="background:#22c55e"></span>'+t('Mood')+'</span><span><span class="swatch" style="background:var(--accent)"></span>'+t('Check-in/Habits')+'</span><span><span class="swatch" style="background:var(--border)"></span>'+t('Inactive')+'</span></div>';
  h += '<button class="btn btn-outline btn-sm" onclick="CAL_MONTH_OFFSET=0;render()" style="margin-top:8px">'+t('Jump to Today')+'</button>';
  h += '</div>';
  return h;
}

function isPastReminder(r) {
  var dtStr = r.date + (r.time ? 'T'+r.time : 'T23:59');
  return new Date(dtStr) < new Date();
}
function formatReminderDate(date, time) {
  if (!date) return '';
  var parts = date.split('-');
  if (parts.length!==3) return date;
  var d = new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var label = days[d.getDay()]+', '+months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
  if (time) label += ' at '+time;
  return label;
}

    document.getElementById('rem-date').value = def;
  }
}
function saveReminder(btn, editId) {
  var title = document.getElementById('rem-title');

  };

function deleteReminder(id) {

  render();

function exportReminderICS(id) {
  var r = D.reminders&&D.reminders[id];
  if (!r) return;
  var now = new Date();
  var pad2 = function(n){return String(n).padStart(2,'0')};
  var fmtDT = function(d){return d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate())+'T'+pad2(d.getHours())+pad2(d.getMinutes())+'00'};
  var dtParts = r.date.split('-');
  var startDate = new Date(parseInt(dtParts[0]),parseInt(dtParts[1])-1,parseInt(dtParts[2]));
  if (r.time) { var tm=r.time.split(':');startDate.setHours(parseInt(tm[0]),parseInt(tm[1])) }
  var dtStart = fmtDT(startDate);
  var dtStamp = fmtDT(now);
  var rrule = '';
  if (r.repeat==='daily') rrule = 'RRULE:FREQ=DAILY';
  else if (r.repeat==='weekly') rrule = 'RRULE:FREQ=WEEKLY';
  else if (r.repeat==='monthly') rrule = 'RRULE:FREQ=MONTHLY';
  var icsLines = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Re.Claim//Reminders//EN',
    'CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',
    'UID:reminder-'+r.id+'@reclaim','DTSTAMP:'+dtStamp,'DTSTART:'+dtStart,
    'SUMMARY:'+(r.title||'').replace(/\n/g,'\\n'),
    r.notes ? 'DESCRIPTION:'+r.notes.replace(/\n/g,'\\n') : '',
    rrule,'END:VEVENT','END:VCALENDAR'
  ];
  var ics = icsLines.filter(function(l){return l}).join('\r\n');
  var blob = new Blob([ics],{type:'text/calendar;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'reminder-'+(r.title||'reminder').replace(/[^a-z0-9]/gi,'-').toLowerCase().slice(0,40)+'.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url)},1000);
}

function changeAvatar() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        var maxDim = 400;
        var w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) { if (w > h) { h = h / w * maxDim; w = maxDim; } else { w = w / h * maxDim; h = maxDim; } }
        var c = document.createElement('canvas'); c.width = w; c.height = h;
        var ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
        D.avatar = c.toDataURL('image/jpeg', 0.7);
        saveData();
        render();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}
function exportData() {
  var blob = new Blob([JSON.stringify(D, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'reclaim-data-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
}

function importData() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        for (var k in data) D[k] = data[k];
        saveData();
        alert(t('Data imported successfully!'));
      } catch(err) { alert(t('Invalid file format.')); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function saveCraving(btn) {
  var val = parseInt(document.getElementById('craving-val').textContent);
  var trigger = document.getElementById('craving-trigger').value.trim();
  if (!D.cravings) D.cravings = [];
  D.cravings.push({ intensity: val, trigger: trigger, date: new Date().toDateString(), time: String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0'), timestamp: Date.now() });
  saveData();
  btn.closest('.overlay').remove();
  showCravingPatterns();
}

function showCravingPatterns() {
  if (!D.cravings || !D.cravings.length) return;
  var overlay = document.createElement('div');
  overlay.className = 'overlay';
  var c = D.cravings;
  var avgIntensity = Math.round(c.reduce(function(s,cr){return s+cr.intensity},0)/c.length);
  var timeSlots = {morning:0, afternoon:0, evening:0, night:0};
  var triggerCounts = {};
  c.forEach(function(cr){
    var h = parseInt(cr.time.split(':')[0]);
    if (h<12) timeSlots.morning++; else if (h<17) timeSlots.afternoon++; else if (h<21) timeSlots.evening++; else timeSlots.night++;
    if (cr.trigger) {
      var words = cr.trigger.toLowerCase().split(/[\s,]+/);
      words.forEach(function(w){ if (w.length>3) { triggerCounts[w] = (triggerCounts[w]||0)+1; } });
    }
  });
  var topTriggers = Object.keys(triggerCounts).sort(function(a,b){return triggerCounts[b]-triggerCounts[a]}).slice(0,5);
  var peakTime = Object.keys(timeSlots).reduce(function(a,b){return timeSlots[a]>timeSlots[b]?a:b});
  var h = '<div class="overlay-content" style="max-width:420px"><div style="text-align:center;margin-bottom:12px"><div style="font-size:36px;margin-bottom:4px">&#128202;</div><h3 style="font-size:18px;font-weight:700;margin:0">'+t('Craving Patterns')+'</h3><p style="font-size:12px;color:var(--muted);margin-top:2px">'+t('Based on')+' ' + c.length + ' '+t('logged cravings')+'</p></div><div class="stat-grid" style="margin-bottom:8px"><div class="stat-card"><div class="num">' + avgIntensity + '</div><div class="label">'+t('Avg Intensity')+'</div></div><div class="stat-card"><div class="num" style="text-transform:capitalize">' + peakTime + '</div><div class="label">'+t('Peak Time')+'</div></div><div class="stat-card"><div class="num">' + c.length + '</div><div class="label">'+t('Total Logged')+'</div></div></div>';
  if (topTriggers.length) h += '<div class="card" style="padding:10px"><h3>'+t('Common Triggers')+'</h3><div style="font-size:13px">' + topTriggers.map(function(t){return '&bull; ' + t}).join('<br>') + '</div></div>';
  h += '<button class="btn btn-outline btn-sm" onclick="logCraving()" style="margin-right:4px">+ '+t('Log Another')+'</button><button class="btn btn-outline btn-sm" onclick="this.closest(\'.overlay\').remove()">'+t('Close')+'</button></div>';
  overlay.innerHTML = h;
  document.body.appendChild(overlay);
}

  if (!D.cravings || !D.cravings.length) {

function currentMonthlyChallenge() {
  var now = new Date();
  var month = now.getMonth();
  var year = now.getFullYear();
  if (D.monthlyChallenge && D.monthlyChallenge.year === year && D.monthlyChallenge.month === month) return D.monthlyChallenge;
  var challenge = MONTHLY_CHALLENGES[month];
  return { month: month, year: year, title: challenge.title, icon: challenge.icon, target: challenge.target, targetCount: challenge.count, progress: 0, completed: false };
}

function getChallengeProgress(challenge) {
  if (!challenge) return 0;
  var now = new Date(), month = now.getMonth(), year = now.getFullYear();
  var count = 0;
  switch (challenge.target) {
    case 'journal': count = D.journal.filter(function(j){var d=new Date(j.date);return d.getMonth()===month&&d.getFullYear()===year}).length; break;
    case 'mood': count = D.moods.filter(function(m){var d=new Date(m.date);return d.getMonth()===month&&d.getFullYear()===year}).length; break;
    case 'habit': count = D.habits.reduce(function(s,h){return s+(h.logs?h.logs.filter(function(l){var d=new Date(l);return d.getMonth()===month&&d.getFullYear()===year}).length:0)},0); break;
    case 'checkin': count = D.checkins.filter(function(c){var d=new Date(c.date);return d.getMonth()===month&&d.getFullYear()===year}).length; break;
    case 'sober': count = soberDays(); break;
  }
  // Auto-save challenge progress
  D.monthlyChallenge = { month: challenge.month, year: challenge.year, title: challenge.title, icon: challenge.icon, target: challenge.target, targetCount: challenge.targetCount, progress: count, completed: count >= challenge.targetCount };
  return count;
}

function calcJournalStreak() {
  if (!D.journal.length) return 0;
  var datesMap = {};
  for (var i=0;i<D.journal.length;i++) datesMap[D.journal[i].date] = true;
  var dates = Object.keys(datesMap).sort().reverse();
  var streak = 0;
  var checkDate = new Date();
  for (var i=0;i<dates.length;i++) {
    var d = new Date(checkDate);
    if (dates[i] === d.toDateString()) { streak++; checkDate.setDate(checkDate.getDate()-1); }
    else break;
  }
  return streak;
}

function buddyMessagesHTML() {
  var buddyEmail = D.buddy ? D.buddy.contact : '';
  var h = '<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="font-size:18px">&#128172;</div><h3 style="margin:0">Messages</h3></div><div id="buddy-messages-list">';
  var localMsgs = (D.messages||[]).filter(function(m){return m.from === buddyEmail || m.to === buddyEmail}).slice(-20);
  if (!localMsgs.length) {
    h += '<div class="empty-state">Loading messages...</div>';
  } else {
    h += '<div style="max-height:200px;overflow-y:auto;margin-bottom:8px">';
    for (var mi=0;mi<localMsgs.length;mi++) {
      var isMe = localMsgs[mi].from === AUTH_EMAIL;
      h += '<div style="padding:6px 10px;border-radius:10px;margin:4px 0;background:' + (isMe ? 'var(--primary-light)' : 'var(--card)') + ';text-align:' + (isMe ? 'right' : 'left') + ';font-size:13px"><div>' + localMsgs[mi].text + '</div><div style="font-size:10px;color:var(--muted)">' + localMsgs[mi].date + ' ' + localMsgs[mi].time + '</div></div>';
    }
    h += '</div>';
  }
  h += '</div><div style="display:flex;gap:6px"><input type="text" id="buddy-msg-input" placeholder="Type a message..." style="flex:1;margin:0"><button class="btn btn-sm btn-primary" onclick="buddySendMessage()" style="width:auto">Send</button></div></div>';
  // Fetch messages from Firestore (two simple queries â€” no composite index needed)
  if (buddyEmail) {
    setTimeout(function(){
      var el = document.getElementById('buddy-messages-list');
      if (!el) return;
      Promise.all([
        DB.collection('messages').where('from', '==', AUTH_EMAIL).limit(30).get(),
        DB.collection('messages').where('from', '==', buddyEmail).limit(30).get()
      ]).then(function(results){
        var fireMsgs = [];
        results.forEach(function(snapshot){
          snapshot.forEach(function(doc){
            var d = doc.data();
            // Only keep messages between this user and the buddy
            if ((d.from === AUTH_EMAIL && d.to === buddyEmail) || (d.from === buddyEmail && d.to === AUTH_EMAIL)) {
              fireMsgs.push(d);
            }
          });
        });
        // Merge with local, deduplicate by timestamp+text
        var seen = {};
        localMsgs.concat(fireMsgs).forEach(function(m){ seen[m.timestamp + m.text] = true; });
        var all = [];
        Object.keys(seen).forEach(function(k){
          var found = localMsgs.concat(fireMsgs).filter(function(m){ return m.timestamp + m.text === k; })[0];
          if (found) all.push(found);
        });
        all.sort(function(a,b){ return (a.timestamp||0) - (b.timestamp||0); });
        all = all.slice(-20);
        if (!all.length) {
          el.innerHTML = '<div class="empty-state">Send a message to ' + (D.buddy?D.buddy.name:'your buddy') + '!</div>';
          return;
        }
        var html = '<div style="max-height:200px;overflow-y:auto;margin-bottom:8px">';

          var me = all[i].from === AUTH_EMAIL;

        }
        html += '</div>';
        el.innerHTML = html;
      }).catch(function(){});
    }, 500);
  }
  return h;
}

function requestNotif() {

function swNotify(title, body, icon, tag) {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  if (navigator.serviceWorker) {
    navigator.serviceWorker.ready.then(function(reg) {
      reg.showNotification(title, {body:body, icon:icon || 'icon-192.png', tag:tag || 'reclaim-notification'});
    }).catch(function() {
      try { new Notification(title, {body:body, icon:icon, tag:tag}); } catch(e) {}
    });
  } else {
    try { new Notification(title, {body:body, icon:icon, tag:tag}); } catch(e) {}
  }
}
function checkNotifications() {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  var n = D.notifications || {morning:false,evening:false,morningTime:'08:00',eveningTime:'20:00',craving:false,journal:false,breathe:false,cravingTime:'14:00',journalTime:'12:00',breatheTime:'10:00'};
  var now = new Date();
  var hm = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var s = D.streak || 0;
  // Reset notification flags when the date changes
  var todayStr = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  if (D._notifiedDate !== todayStr) {
    D._notifiedMorning = false; D._notifiedEvening = false; D._notifiedCraving = false; D._notifiedJournal = false; D._notifiedBreathe = false;
    D._notifiedDate = todayStr;
  }
  if (n.morning && hm === n.morningTime && !D._notifiedMorning) {
    swNotify('Re.Claim Morning', s > 0 ? 'Day ' + s + '! Log your mood and set your intention.' : 'Log your mood and set your intention for today.', 'icon-192.png', 'reclaim-morning');
    D._notifiedMorning = true; saveData();
  }
  if (n.evening && hm === n.eveningTime && !D._notifiedEvening) {
    swNotify('Re.Claim Evening', s > 0 ? 'Day ' + s + ' made it! Journal what happened today.' : 'Journal what happened and how you feel today.', 'icon-192.png', 'reclaim-evening');
    D._notifiedEvening = true; saveData();
  }
  if (n.craving && hm === n.cravingTime && !D._notifiedCraving) {
    swNotify('Craving Check-In', 'Pause and check in with yourself. Log any cravings or urges you\'re feeling.', 'icon-192.png', 'reclaim-craving');
    D._notifiedCraving = true; saveData();
  }
  if (n.journal && hm === n.journalTime && !D._notifiedJournal) {
    swNotify('Journal Prompt', 'Take 5 minutes to write about what\'s on your mind. You\'ve got this.', 'icon-192.png', 'reclaim-journal');
    D._notifiedJournal = true; saveData();
  }
  if (n.breathe && hm === n.breatheTime && !D._notifiedBreathe) {
    swNotify('Time to Breathe', 'Take a 2-minute breathing exercise. Inhale calm, exhale stress.', 'icon-192.png', 'reclaim-breathe');
    D._notifiedBreathe = true; saveData();
  }
  // Check due reminders
  if (n.reminderNotif !== false && D.reminders) {
    for (var ri=0;ri<D.reminders.length;ri++) {
      var rr = D.reminders[ri];
      if (rr.notified) continue;
      var rDtStr = rr.date + (rr.time ? 'T'+rr.time : 'T23:59');
      if (new Date(rDtStr) <= now) {
        swNotify('Reminder: '+(rr.title||'Reminder'), rr.notes || 'You have a reminder due.', 'icon-192.png', 'reclaim-reminder-'+ri);
        rr.notified = true;
        saveData();
      }
    }
  }
  // Re-arm repeating reminders at day boundary
  if (hm === '00:01' && D.reminders) {
    D.reminders.forEach(function(rr){if(rr.repeat&&rr.repeat!=='none')rr.notified=false});
  }
}

// ====== CLIENT-SIDE ENCRYPTION (AES-256-GCM) ======
var ENC_KEY = null;
var ENC_CACHE = {};
function isEncryptionEnabled() { return D.encryption && D.encryption.enabled && D.encryption.salt && D.encryption.keyCheck; }
function deriveEncryptionKey(passphrase, salt) {
  var enc = new TextEncoder();
  return crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']).then(function(key) {
    return crypto.subtle.deriveKey({name:'PBKDF2', salt:salt, iterations:600000, hash:'SHA-256'}, key, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
  });
}
function encryptText(plaintext, key) {
  var iv = crypto.getRandomValues(new Uint8Array(12));
  return crypto.subtle.encrypt({name:'AES-GCM', iv:iv}, key, new TextEncoder().encode(plaintext)).then(function(ciphertext) {
    var ct = new Uint8Array(ciphertext);
    var ivStr = '', ctStr = '';
    for (var i=0;i<iv.length;i++) ivStr += String.fromCharCode(iv[i]);
    for (var i=0;i<ct.length;i++) ctStr += String.fromCharCode(ct[i]);
    return {enc:true, iv:btoa(ivStr), data:btoa(ctStr)};
  });
}
function decryptText(encrypted, key) {
  if (!encrypted || !encrypted.enc) return Promise.resolve(encrypted);
  var iv = new Uint8Array(atob(encrypted.iv).split('').map(function(c){return c.charCodeAt(0)}));
  var ct = new Uint8Array(atob(encrypted.data).split('').map(function(c){return c.charCodeAt(0)}));
  return crypto.subtle.decrypt({name:'AES-GCM', iv:iv}, key, ct).then(function(plain) {
    return new TextDecoder().decode(plain);
  });
}
function encryptAllEntries(key) {
  return Promise.all(D.journal.map(function(entry, i) {
    if (entry.text && typeof entry.text === 'string') {
      return encryptText(entry.text, key).then(function(enc) { D.journal[i].text = enc; });
    }
  }));
}
function decryptAllEntries() {
  ENC_CACHE = {};
  if (!ENC_KEY || !isEncryptionEnabled()) return Promise.resolve();
  return Promise.all(D.journal.map(function(entry, i) {
    if (entry.text && typeof entry.text === 'object' && entry.text.enc) {
      return decryptText(entry.text, ENC_KEY).then(function(text) { ENC_CACHE[entry.text.data] = text; });
    } else if (entry.text && typeof entry.text === 'string') {
      ENC_CACHE[i+'s'] = entry.text;
    }
  }));
}
function getEntryText(entry) {
  if (!entry || !entry.text) return '';
  if (typeof entry.text === 'string') return entry.text;
  if (entry.text && entry.text.enc && ENC_CACHE[entry.text.data]) return ENC_CACHE[entry.text.data];
  if (entry.text && entry.text.enc) return '[Encrypted]';
  return entry.text;
}
function setupEncryption(passphrase) {
  if (!passphrase || passphrase.length < 4) { alert('Passphrase must be at least 4 characters.'); return Promise.reject(); }
  var salt = crypto.getRandomValues(new Uint8Array(16));
  return deriveEncryptionKey(passphrase, salt).then(function(key) {
    return encryptText('ENCRYPTION_KEY_CHECK_v1', key).then(function(enc) {
      D.encryption = { enabled: true, salt: btoa(String.fromCharCode.apply(null, salt)), keyCheck: enc };
      ENC_KEY = key;
      return encryptAllEntries(key);
    });
  }).then(function() { saveData(); return decryptAllEntries(); });
}
function verifyEncryptionPassphrase(passphrase) {
  if (!isEncryptionEnabled()) return Promise.reject('Encryption not enabled');
  var salt = new Uint8Array(atob(D.encryption.salt).split('').map(function(c){return c.charCodeAt(0)}));
  return deriveEncryptionKey(passphrase, salt).then(function(key) {
    return decryptText(D.encryption.keyCheck, key).then(function(text) {
      if (text === 'ENCRYPTION_KEY_CHECK_v1') { ENC_KEY = key; return decryptAllEntries(); }
      throw new Error('Wrong passphrase');
    });
  });
}
function unlockEncryption(passphrase) {
  return verifyEncryptionPassphrase(passphrase);
}
function changeEncryptionPassphrase(oldPass, newPass) {
  if (!isEncryptionEnabled() || !ENC_KEY) return Promise.reject('Not unlocked');
  return setupEncryption(newPass);
}
function disableEncryption() {
  if (!isEncryptionEnabled()) return Promise.resolve();
  if (!ENC_KEY) { alert('Unlock encryption first.'); return Promise.reject(); }
  return Promise.all(D.journal.map(function(entry, i) {
    if (entry.text && typeof entry.text === 'object' && entry.text.enc) {
      return decryptText(entry.text, ENC_KEY).then(function(text) { D.journal[i].text = text; });
    }
  })).then(function() {
    D.encryption = { enabled: false, salt: null, keyCheck: null };
    ENC_KEY = null; ENC_CACHE = {};
    saveData();
  });
}

var ENC_UNLOCK_CALLBACK = null;
function promptEncryptionPassphrase(callback) {
  ENC_UNLOCK_CALLBACK = callback || null;
  var overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = '<div class="overlay-content" style="text-align:center"><h3 style="font-size:18px;font-weight:700;margin-bottom:12px">&#128274; '+t('Unlock Encryption')+'</h3><p style="font-size:13px;color:var(--muted);margin-bottom:16px">'+t('Enter your encryption passphrase to access journal entries.')+'</p><input type="password" id="enc-unlock-input" placeholder="'+t('Encryption passphrase')+'" style="font-size:16px;text-align:center;margin-bottom:12px;letter-spacing:2px"><div style="color:var(--danger);font-size:12px;margin-bottom:8px;display:none" id="enc-unlock-error">'+t('Wrong passphrase. Try again.')+'</div><button class="btn btn-primary" id="enc-unlock-btn" onclick="doUnlockEncryption(this)">'+t('Unlock')+'</button><button class="btn btn-outline" onclick="this.closest(\'.overlay\').remove();ENC_UNLOCK_CALLBACK=null" style="margin-top:6px">'+t('Cancel')+'</button></div>';
  document.body.appendChild(overlay);
  setTimeout(function(){var inp=document.getElementById('enc-unlock-input');if(inp)inp.focus()},100);
}
function doUnlockEncryption(btn) {
  var p = document.getElementById('enc-unlock-input');
  var e = document.getElementById('enc-unlock-error');
  if (!p || !p.value.trim()) { alert('Enter your passphrase.'); return; }
  p.disabled = true; btn.disabled = true;
  unlockEncryption(p.value.trim()).then(function() {
    p.disabled = false; btn.disabled = false;
    var cb = ENC_UNLOCK_CALLBACK; ENC_UNLOCK_CALLBACK = null;
    btn.closest('.overlay').remove();
    render();
    if (typeof cb === 'function') cb();
  }).catch(function() {
    p.disabled = false; btn.disabled = false;
    e.style.display = 'block'; p.value = ''; p.focus();
  });
}

// ====== RENDER & NAV ======
var MORE_SUB_PAGES = ['journal','calendar','library','music','reports','buddy','coping','assessment','profile','safety','reminders'];
var REFLECT_SUB_PAGES = [];

function safetyHTML() {
  var h = '<h2 style="font-size:20px;font-weight:700;margin:8px 0">My Addiction Targets</h2>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:12px">Select what you are working on. Arthur will create a personalized safety plan for each one.</p>';
  h += '<div class="card" style="border:2px solid var(--primary)"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div style="width:36px;height:36px;border-radius:18px;background:linear-gradient(135deg,var(--primary),#34d399);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:700">A</div><div><h3 style="margin:0;font-size:15px">Safety Plans</h3></div></div>';
  var addictions = D.targetAddictions || [];
  if (!addictions.length) {
    h += '<p style="font-size:13px;color:var(--muted);margin-bottom:8px">Choose one or more addictions you want to work on:</p>';
  }
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">';
  for (var i=0;i<ADDICTION_TYPES.length;i++) {
    var selected = addictions.indexOf(ADDICTION_TYPES[i]) >= 0;
    h += '<button class="btn btn-sm ' + (selected ? 'btn-primary' : 'btn-outline') + '" onclick="toggleTargetAddiction(\''+ADDICTION_TYPES[i]+'\')" style="font-size:11px;padding:8px">' + (selected ? '&#10003; ' : '') + ADDICTION_TYPES[i] + '</button>';
  }
  h += '</div>';
  if (addictions.length) {
    h += '<button class="btn btn-sm btn-outline" onclick="D.targetAddictions=[];saveData()" style="margin-bottom:8px;width:auto">Clear All</button>';
    for (var a=0;a<addictions.length;a++) {
      var type = addictions[a];
      var sp = SAFETY_PLANS[type] || SAFETY_PLANS['Other'];
      h += '<div style="background:var(--primary-light);padding:12px;border-radius:10px;margin-bottom:8px">';
      h += '<div style="font-weight:700;font-size:13px;margin-bottom:4px">' + type + '</div>';
      h += '<p style="font-size:12px;line-height:1.5;margin-bottom:6px">' + sp.plan + '</p>';
      h += '<div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:3px">Steps:</div>';
      for (var s=0;s<sp.steps.length;s++) {
        h += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px"><span style="width:18px;height:18px;border-radius:9px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0">' + (s+1) + '</span>' + sp.steps[s] + '</div>';
      }
      h += '</div>';
    }
  }
  h += '</div>';
  return h;
}

function render() {
  if (LOCK_ENABLED) return;
  var app = document.getElementById('app');
  if (!app) return;
  var pages = {
    home: homeHTML, track: trackHTML, care: careHTML, reflect: reflectHTML,
    more: moreHTML, journal: journalHTML, library: libraryHTML, music: musicHTML,
    reports: reportsHTML, buddy: buddyHTML, coping: copingHTML,
    assessment: assessmentHTML, profile: profileHTML,
    calendar: calendarHTML, safety: safetyHTML,
    reminders: remindersHTML,
  };
  var fn = pages[pg];
  if (fn) app.innerHTML = fn();
  else { pg = 'home'; app.innerHTML = homeHTML(); }

  document.querySelectorAll('.tab').forEach(function(t){
    var tp = t.getAttribute('data-page');
    t.classList.toggle('active', tp === pg || (tp === 'more' && MORE_SUB_PAGES.indexOf(pg) !== -1) || (tp === 'reflect' && REFLECT_SUB_PAGES.indexOf(pg) !== -1));
  });
  document.getElementById('tabs').style.display = 'flex';
  var tb = document.querySelector('.top-bar');
  if (tb) tb.style.display = 'flex';
  applyTheme();
  updateTabLabels();
  if (pg === 'home') { setTimeout(function(){ checkMilestone(); }, 500); }
}

function goTo(p) {
  document.querySelectorAll('[id$="-ov"],.overlay').forEach(function(el){el.remove()});
  pg = p;
  render();
}

document.getElementById('tabs').addEventListener('click', function(e) {
  var tab = e.target.closest('.tab');
  if (tab) {
    document.querySelectorAll('.overlay').forEach(function(el){el.remove()});
    var tp = tab.getAttribute('data-page');
    subPg = '';
    if (tp === 'more' && MORE_SUB_PAGES.indexOf(pg) !== -1) { pg = 'more'; render(); return; }
    if (tp === 'reflect' && REFLECT_SUB_PAGES.indexOf(pg) !== -1) { pg = 'reflect'; render(); return; }
    pg = tp;
    render();
  }
});
