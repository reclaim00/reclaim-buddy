// ====== STREAK CALENDAR ======
var CAL_MONTH_OFFSET = 0;

function calendarHTML() {
  var now = new Date();
  var d = new Date(now.getFullYear(), now.getMonth() + CAL_MONTH_OFFSET, 1);
  var year = d.getFullYear(), month = d.getMonth();
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var h = '<h2 style="font-size:20px;font-weight:700;margin:8px 0">Streak Calendar</h2>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:8px">Color-coded view of your daily activity.</p>';
  h += '<div class="card">';
  h += '<div class="cal-nav"><button onclick="CAL_MONTH_OFFSET--;render()">Prev</button><span style="font-weight:700;font-size:15px">'+months[month]+' '+year+'</span><button onclick="CAL_MONTH_OFFSET++;render()">Next</button></div>';
  h += '<div class="cal-grid">';
  var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for (var i=0;i<7;i++) h += '<div class="cal-header">'+dayNames[i]+'</div>';
  var firstDay = d.getDay();
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var prevDays = new Date(year, month, 0).getDate();
  for (var i=0;i<firstDay;i++) { h += '<div class="cal-day other-month" style="background:transparent;cursor:default">'+(prevDays-firstDay+1+i)+'</div>'; }
  for (var day=1;day<=daysInMonth;day++) {
    var dateObj = new Date(year, month, day);
    var dateStr = dateObj.toDateString();
    var isToday = dateStr === now.toDateString();
    var isFuture = dateObj > now;
    var hasMood = D.moods.some(function(m){return m.date===dateStr});
    var hasCheck = D.checkins.some(function(c){return c.date===dateStr});
    var habitsDone = D.habits.filter(function(h){return h.logs && h.logs.indexOf(dateStr)!==-1}).length;
    var hasJournal = D.journal.some(function(j){return j.date===dateStr});
    if (!isFuture) {
      if (hasMood && habitsDone > 0) { h += '<div class="cal-day'+(isToday?' today':'')+'" style="background:var(--primary);color:#fff" onclick="showDayDetail(\''+dateStr+'\')"><span>'+day+'</span></div>'; }
      else if (hasMood && hasJournal) { h += '<div class="cal-day'+(isToday?' today':'')+'" style="background:#3b82f6;color:#fff" onclick="showDayDetail(\''+dateStr+'\')"><span>'+day+'</span></div>'; }
      else if (hasMood) { h += '<div class="cal-day'+(isToday?' today':'')+'" style="background:#22c55e;color:#fff" onclick="showDayDetail(\''+dateStr+'\')"><span>'+day+'</span></div>'; }
      else if (hasCheck || habitsDone > 0) { h += '<div class="cal-day'+(isToday?' today':'')+'" style="background:var(--accent);color:#fff" onclick="showDayDetail(\''+dateStr+'\')"><span>'+day+'</span></div>'; }
      else { h += '<div class="cal-day'+(isToday?' today':'')+'" style="background:var(--border);color:var(--muted)" onclick="showDayDetail(\''+dateStr+'\')"><span>'+day+'</span></div>'; }
    } else {
      h += '<div class="cal-day future" style="background:transparent;color:var(--muted)"><span>'+day+'</span></div>';
    }
  }
  var rem = 7 - ((firstDay + daysInMonth) % 7);
  if (rem < 7) { for (var i=1;i<=rem;i++) { h += '<div class="cal-day other-month" style="background:transparent;cursor:default">'+i+'</div>'; } }
  h += '</div>';
  h += '<div class="cal-legend"><span><span class="swatch" style="background:var(--primary)"></span>Mood+Habits</span><span><span class="swatch" style="background:#3b82f6"></span>Mood+Journal</span><span><span class="swatch" style="background:#22c55e"></span>Mood</span><span><span class="swatch" style="background:var(--accent)"></span>Check-in/Habits</span><span><span class="swatch" style="background:var(--border)"></span>Inactive</span></div>';
  h += '<button class="btn btn-outline btn-sm" onclick="CAL_MONTH_OFFSET=0;render()" style="margin-top:8px">Jump to Today</button>';
  h += '</div>';
  return h;
}

function showDayDetail(dateStr) {
  var overlay = document.createElement('div');
  overlay.className = 'overlay';
  var h = '<div class="overlay-content"><h3 style="font-size:18px;font-weight:700;margin-bottom:8px">'+dateStr+'</h3>';
  var mood = D.moods.filter(function(m){return m.date===dateStr});
  var check = D.checkins.filter(function(c){return c.date===dateStr});
  var habits = D.habits.filter(function(h){return h.logs && h.logs.indexOf(dateStr)!==-1});

  h += '<div style="font-size:13px;line-height:1.8">';
  h += '<div><strong>Mood:</strong> '+(mood.length?MOODS[mood[mood.length-1].val-1].label:'None')+'</div>';

  overlay.innerHTML = h;
  document.body.appendChild(overlay);
}

// ====== LETTER TO FUTURE / PAST SELF ======
var LETTER_DURATIONS = [
  {label:'1 day', ms:86400000},
  {label:'3 days', ms:259200000},
  {label:'7 days', ms:604800000},
  {label:'14 days', ms:1209600000},
  {label:'30 days', ms:2592000000},
  {label:'90 days', ms:7776000000}
];

function lettersHTML() {
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0">';
  h += '<h2 style="font-size:20px;font-weight:700">Letters</h2>';
  h += '<button class="btn btn-sm btn-primary" onclick="showNewLetter()">+ New Letter</button></div>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:8px">Write a letter to your future self. It stays sealed until the timer expires.</p>';
  if (!D.letters || !D.letters.length) {
    h += '<div class="card"><div class="empty-state">No letters yet. Write one to your future self!</div></div>';
  } else {
    for (var i=D.letters.length-1;i>=0;i--) {
      var l = D.letters[i];
      var now = Date.now();
      var received = now >= l.receiveDate;
      var timeLeft = l.receiveDate - now;
      var daysLeft = Math.ceil(timeLeft / 86400000);
      var cls = received ? 'received' : 'sealed';
      var status = received ? 'Ready to read' : 'Sealed - opens in '+daysLeft+' day'+(daysLeft!==1?'s':'');
      h += '<div class="letter-card '+cls+'" onclick="'+(received?'showLetterContent('+i+')':'')+'">';
      h += '<div class="l-title">'+(l.title||'Letter to myself')+'</div>';
      h += '<div class="l-meta">Written '+l.sentDate+'</div>';
      h += '<div class="l-meta">'+(received?'Received '+new Date(l.receiveDate).toLocaleDateString():'Opens '+new Date(l.receiveDate).toLocaleDateString())+'</div>';
      h += '<div class="l-status" style="color:'+(received?'var(--primary)':'var(--accent)')+'">'+status+'</div>';
      h += '</div>';
    }
  }
  return h;
}

function importData() {

  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        for (var k in data) D[k] = data[k];
        saveData();
        alert('Data imported successfully!');
      } catch(err) { alert('Invalid file format.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function saveCraving(btn) {

  if (!D.cravings) D.cravings = [];
  D.cravings.push({ intensity: val, trigger: trigger, date: new Date().toDateString(), time: String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0'), timestamp: Date.now() });
  saveData();

function showCravingPatterns() {
  if (!D.cravings || !D.cravings.length) return;
  var overlay = document.createElement('div');
  overlay.className = 'overlay';
  var c = D.cravings;
  var avgIntensity = Math.round(c.reduce(function(s,cr){return s+cr.intensity},0)/c.length);
  var timeSlots = {morning:0, afternoon:0, evening:0, night:0};
  var triggerCounts = {};
  c.forEach(function(cr){
    var h = parseInt(cr.time.split(':')[0]);
    if (h<12) timeSlots.morning++; else if (h<17) timeSlots.afternoon++; else if (h<21) timeSlots.evening++; else timeSlots.night++;
    if (cr.trigger) {
      var words = cr.trigger.toLowerCase().split(/[\s,]+/);
      words.forEach(function(w){ if (w.length>3) { triggerCounts[w] = (triggerCounts[w]||0)+1; } });
    }
  });
  var topTriggers = Object.keys(triggerCounts).sort(function(a,b){return triggerCounts[b]-triggerCounts[a]}).slice(0,5);
  var peakTime = Object.keys(timeSlots).reduce(function(a,b){return timeSlots[a]>timeSlots[b]?a:b});
  var h = '<div class="overlay-content" style="max-width:420px"><div style="text-align:center;margin-bottom:12px"><div style="font-size:36px;margin-bottom:4px">&#128202;</div><h3 style="font-size:18px;font-weight:700;margin:0">Craving Patterns</h3><p style="font-size:12px;color:var(--muted);margin-top:2px">Based on ' + c.length + ' logged cravings</p></div><div class="stat-grid" style="margin-bottom:8px"><div class="stat-card"><div class="num">' + avgIntensity + '</div><div class="label">Avg Intensity</div></div><div class="stat-card"><div class="num" style="text-transform:capitalize">' + peakTime + '</div><div class="label">Peak Time</div></div><div class="stat-card"><div class="num">' + c.length + '</div><div class="label">Total Logged</div></div></div>';
  if (topTriggers.length) h += '<div class="card" style="padding:10px"><h3>Common Triggers</h3><div style="font-size:13px">' + topTriggers.map(function(t){return '&bull; ' + t}).join('<br>') + '</div></div>';
  h += '<button class="btn btn-outline btn-sm" onclick="logCraving()" style="margin-right:4px">+ Log Another</button><button class="btn btn-outline btn-sm" onclick="this.closest(\'.overlay\').remove()">Close</button></div>';
  overlay.innerHTML = h;
  document.body.appendChild(overlay);
}

  {month:0, title:'Journal 15 days this month', icon:'📝', target:'journal', count:15}, // Jan

  {month:11, title:'End the year strong — journal 20 days', icon:'🎯', target:'journal', count:20} // Dec
];

function currentMonthlyChallenge() {
  var now = new Date();
  var month = now.getMonth();
  var year = now.getFullYear();
  if (D.monthlyChallenge && D.monthlyChallenge.year === year && D.monthlyChallenge.month === month) return D.monthlyChallenge;
  var challenge = MONTHLY_CHALLENGES[month];
  return { month: month, year: year, title: challenge.title, icon: challenge.icon, target: challenge.target, targetCount: challenge.count, progress: 0, completed: false };
}

function getChallengeProgress(challenge) {
  if (!challenge) return 0;
  var now = new Date(), month = now.getMonth(), year = now.getFullYear();
  var count = 0;
  switch (challenge.target) {
    case 'journal': count = D.journal.filter(function(j){var d=new Date(j.date);return d.getMonth()===month&&d.getFullYear()===year}).length; break;
    case 'mood': count = D.moods.filter(function(m){var d=new Date(m.date);return d.getMonth()===month&&d.getFullYear()===year}).length; break;
    case 'habit': count = D.habits.reduce(function(s,h){return s+(h.logs?h.logs.filter(function(l){var d=new Date(l);return d.getMonth()===month&&d.getFullYear()===year}).length:0)},0); break;
    case 'checkin': count = D.checkins.filter(function(c){var d=new Date(c.date);return d.getMonth()===month&&d.getFullYear()===year}).length; break;
    case 'gratitude': count = (D.gratitude||[]).filter(function(g){var d=new Date(g.date);return d.getMonth()===month&&d.getFullYear()===year}).length; break;
    case 'sober': count = soberDays(); break;
  }
  // Auto-save challenge progress
  D.monthlyChallenge = { month: challenge.month, year: challenge.year, title: challenge.title, icon: challenge.icon, target: challenge.target, targetCount: challenge.targetCount, progress: count, completed: count >= challenge.targetCount };
  return count;
}

function monthlyChallengeHTML() {
  var challenge = currentMonthlyChallenge();
  var progress = getChallengeProgress(challenge);
  var pct = Math.min(100, Math.round((progress / challenge.targetCount) * 100));
  var done = progress >= challenge.targetCount;

function buddySendMessage() {
  var msgInput = document.getElementById('buddy-msg-input');
  if (!msgInput || !msgInput.value.trim()) return;
  var msg = msgInput.value.trim();
  if (!D.messages) D.messages = [];
  D.messages.push({ from: AUTH_EMAIL, to: D.buddy.contact, text: msg, date: new Date().toDateString(), time: String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0'), timestamp: Date.now() });
  msgInput.value = '';
  saveData();
  // Also save to Firestore
  DB.collection('messages').add({
    from: AUTH_EMAIL, to: D.buddy.contact, text: msg,
    date: new Date().toDateString(),
    time: String(new Date().getHours()).padStart(2,'0')+':'+String(new Date().getMinutes()).padStart(2,'0'),
    timestamp: Date.now()
  }).catch(function(){});
  render();
}

function buddyMessagesHTML() {
  var buddyEmail = D.buddy ? D.buddy.contact : '';
  var h = '<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="font-size:18px">&#128172;</div><h3 style="margin:0">Messages</h3></div><div id="buddy-messages-list">';
  var localMsgs = (D.messages||[]).filter(function(m){return m.from === buddyEmail || m.to === buddyEmail}).slice(-20);
  if (!localMsgs.length) {
    h += '<div class="empty-state">Loading messages...</div>';
  } else {
    h += '<div style="max-height:200px;overflow-y:auto;margin-bottom:8px">';
    for (var mi=0;mi<localMsgs.length;mi++) {
      var isMe = localMsgs[mi].from === AUTH_EMAIL;
      h += '<div style="padding:6px 10px;border-radius:10px;margin:4px 0;background:' + (isMe ? 'var(--primary-light)' : 'var(--card)') + ';text-align:' + (isMe ? 'right' : 'left') + ';font-size:13px"><div>' + localMsgs[mi].text + '</div><div style="font-size:10px;color:var(--muted)">' + localMsgs[mi].date + ' ' + localMsgs[mi].time + '</div></div>';
    }
    h += '</div>';
  }
  h += '</div><div style="display:flex;gap:6px"><input type="text" id="buddy-msg-input" placeholder="Type a message..." style="flex:1;margin:0"><button class="btn btn-sm btn-primary" onclick="buddySendMessage()" style="width:auto">Send</button></div></div>';
  // Fetch messages from Firestore (two simple queries — no composite index needed)
  if (buddyEmail) {
    setTimeout(function(){
      var el = document.getElementById('buddy-messages-list');
      if (!el) return;
      Promise.all([
        DB.collection('messages').where('from', '==', AUTH_EMAIL).limit(30).get(),
        DB.collection('messages').where('from', '==', buddyEmail).limit(30).get()
      ]).then(function(results){
        var fireMsgs = [];
        results.forEach(function(snapshot){
          snapshot.forEach(function(doc){
            var d = doc.data();
            // Only keep messages between this user and the buddy
            if ((d.from === AUTH_EMAIL && d.to === buddyEmail) || (d.from === buddyEmail && d.to === AUTH_EMAIL)) {
              fireMsgs.push(d);
            }
          });
        });
        // Merge with local, deduplicate by timestamp+text
        var seen = {};
        localMsgs.concat(fireMsgs).forEach(function(m){ seen[m.timestamp + m.text] = true; });
        var all = [];
        Object.keys(seen).forEach(function(k){
          var found = localMsgs.concat(fireMsgs).filter(function(m){ return m.timestamp + m.text === k; })[0];
          if (found) all.push(found);
        });
        all.sort(function(a,b){ return (a.timestamp||0) - (b.timestamp||0); });
        all = all.slice(-20);
        if (!all.length) {
          el.innerHTML = '<div class="empty-state">Send a message to ' + (D.buddy?D.buddy.name:'your buddy') + '!</div>';
          return;
        }
        var html = '<div style="max-height:200px;overflow-y:auto;margin-bottom:8px">';
        for (var i=0;i<all.length;i++) {
          var me = all[i].from === AUTH_EMAIL;
          html += '<div style="padding:6px 10px;border-radius:10px;margin:4px 0;background:' + (me ? 'var(--primary-light)' : 'var(--card)') + ';text-align:' + (me ? 'right' : 'left') + ';font-size:13px"><div>' + all[i].text + '</div><div style="font-size:10px;color:var(--muted)">' + all[i].date + ' ' + all[i].time + '</div></div>';
        }
        html += '</div>';
        el.innerHTML = html;
      }).catch(function(){});
    }, 500);
  }
  return h;
}

// ====== NOTIFICATIONS ======
function requestNotif() {
  if (!("Notification" in window)) return;
  if (Notification.permission === "default") Notification.requestPermission();
}
function swNotify(title, body, icon, tag) {
  if (navigator.serviceWorker && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({type:'show-notification',title:title,body:body,icon:icon,tag:tag});
  } else {
    try { new Notification(title, {body:body,icon:icon,tag:tag}); } catch(e) {}
  }
}
function checkNotifications() {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  var n = D.notifications || {morning:false,evening:false,morningTime:'08:00',eveningTime:'20:00'};
  var now = new Date();
  var hm = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var s = D.streak || 0;
  if (n.morning && hm === n.morningTime && !D._notifiedMorning) {
    swNotify('Re.Claim Morning', s > 0 ? 'Day ' + s + '! Log your mood and set your intention.' : 'Log your mood and set your intention for today.', 'https://emojicdn.elk.sh/%F0%9F%8C%B1', 'reclaim-morning');
    D._notifiedMorning = true; D._notifiedEvening = false;
  }
  if (n.evening && hm === n.eveningTime && !D._notifiedEvening) {
    swNotify('Re.Claim Evening', s > 0 ? 'Day ' + s + ' made it! Journal what happened today.' : 'Journal what happened and how you feel today.', 'https://emojicdn.elk.sh/%F0%9F%8C%99', 'reclaim-evening');
    D._notifiedEvening = true; D._notifiedMorning = false;
  }
  // Reset flags at midnight
  if (hm === '00:01') { D._notifiedMorning = false; D._notifiedEvening = false; }
}
setInterval(checkNotifications, 60000);

  });
}

// ====== RENDER & NAV ======
var MORE_SUB_PAGES = ['journal','letters','calendar','library','music','reports','buddy','coping','assessment','profile','safety'];
var REFLECT_SUB_PAGES = [];

function safetyHTML() {
  var h = '<h2 style="font-size:20px;font-weight:700;margin:8px 0">My Addiction Targets</h2>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:12px">Select what you are working on. Arthur will create a personalized safety plan for each one.</p>';
  h += '<div class="card" style="border:2px solid var(--primary)"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div style="width:36px;height:36px;border-radius:18px;background:linear-gradient(135deg,var(--primary),#34d399);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:700">A</div><div><h3 style="margin:0;font-size:15px">Safety Plans</h3></div></div>';
  var addictions = D.targetAddictions || [];
  if (!addictions.length) {
    h += '<p style="font-size:13px;color:var(--muted);margin-bottom:8px">Choose one or more addictions you want to work on:</p>';
  }
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">';
  for (var i=0;i<ADDICTION_TYPES.length;i++) {
    var selected = addictions.indexOf(ADDICTION_TYPES[i]) >= 0;
    h += '<button class="btn btn-sm ' + (selected ? 'btn-primary' : 'btn-outline') + '" onclick="toggleTargetAddiction(\''+ADDICTION_TYPES[i]+'\')" style="font-size:11px;padding:8px">' + (selected ? '&#10003; ' : '') + ADDICTION_TYPES[i] + '</button>';
  }
  h += '</div>';
  if (addictions.length) {
    h += '<button class="btn btn-sm btn-outline" onclick="D.targetAddictions=[];saveData()" style="margin-bottom:8px;width:auto">Clear All</button>';
    for (var a=0;a<addictions.length;a++) {
      var type = addictions[a];
      var sp = SAFETY_PLANS[type] || SAFETY_PLANS['Other'];
      h += '<div style="background:var(--primary-light);padding:12px;border-radius:10px;margin-bottom:8px">';
      h += '<div style="font-weight:700;font-size:13px;margin-bottom:4px">' + type + '</div>';
      h += '<p style="font-size:12px;line-height:1.5;margin-bottom:6px">' + sp.plan + '</p>';
      h += '<div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:3px">Steps:</div>';
      for (var s=0;s<sp.steps.length;s++) {
        h += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px"><span style="width:18px;height:18px;border-radius:9px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0">' + (s+1) + '</span>' + sp.steps[s] + '</div>';
      }
      h += '</div>';
    }
  }
  h += '</div>';
  return h;
}

function render() {
  if (LOCK_ENABLED) return;
  var app = document.getElementById('app');
  if (!app) return;
  var pages = {
    home: homeHTML, track: trackHTML, care: careHTML, reflect: reflectHTML,
    more: moreHTML, journal: journalHTML, library: libraryHTML, music: musicHTML,
    reports: reportsHTML, buddy: buddyHTML, coping: copingHTML,
    assessment: assessmentHTML, profile: profileHTML,
    letters: lettersHTML, calendar: calendarHTML, safety: safetyHTML,
  };
  var fn = pages[pg];
  if (fn) app.innerHTML = fn();
  else { pg = 'home'; app.innerHTML = homeHTML(); }

  document.querySelectorAll('.tab').forEach(function(t){
    var tp = t.getAttribute('data-page');
    t.classList.toggle('active', tp === pg || (tp === 'more' && MORE_SUB_PAGES.indexOf(pg) !== -1) || (tp === 'reflect' && REFLECT_SUB_PAGES.indexOf(pg) !== -1));
  });
  document.getElementById('tabs').style.display = 'flex';
  var tb = document.querySelector('.top-bar');
  if (tb) tb.style.display = 'flex';
  applyTheme();
}

function goTo(p) {
  document.querySelectorAll('[id$="-ov"],.overlay').forEach(function(el){el.remove()});
  pg = p;
  render();
}

document.getElementById('tabs').addEventListener('click', function(e) {
  var tab = e.target.closest('.tab');
  if (tab) {
    document.querySelectorAll('.overlay').forEach(function(el){el.remove()});
    var tp = tab.getAttribute('data-page');
    subPg = '';
    if (tp === 'more' && MORE_SUB_PAGES.indexOf(pg) !== -1) { pg = 'more'; render(); return; }
    if (tp === 'reflect' && REFLECT_SUB_PAGES.indexOf(pg) !== -1) { pg = 'reflect'; render(); return; }
    pg = tp;
    render();
  }
});

// ====== INIT ======
applyTheme();
// Show sign-in by default; onAuthStateChanged will auto-transition if a session exists
showSignIn();
// If local session exists, optimistically show the app while Firebase restores auth
if (AUTH_USER && !isLockSet()) {
  document.body.classList.add('logged-in');
  render();
  loadFromFirestore(function(cloudData) {
    if (cloudData && cloudData.joinDate) { D = cloudData; saveData(); }
  });
}
</script>
</body>
</html>
